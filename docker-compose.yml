version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kiosk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-kiosk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kiosk_password}
      POSTGRES_DB: ${DB_NAME:-kiosk_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kiosk} -d ${DB_NAME:-kiosk_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosk-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./migrations:/app/migrations:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro

volumes:
  postgres_data:
