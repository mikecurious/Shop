services:
  mongodb:
    image: mongo:7
    container_name: kiosk-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosk-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      VIRTUAL_HOST: shop.dominicatechnologies.com
      LETSENCRYPT_HOST: shop.dominicatechnologies.com
    expose:
      - "8080"
    volumes:
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    networks:
      - internal
      - app-network

volumes:
  mongo_data:

networks:
  internal:
  app-network:
    external: true
