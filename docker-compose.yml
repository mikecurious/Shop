version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: kiosk-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosk-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro

volumes:
  mongo_data:
