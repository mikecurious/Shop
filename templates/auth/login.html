{{define "auth/login.html"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Kiosk Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="h-full flex items-center justify-center bg-gradient-to-br from-indigo-900 to-indigo-700">
<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full shadow-lg mb-4">
      <i class="fas fa-store text-indigo-700 text-2xl"></i>
    </div>
    <h1 class="text-3xl font-bold text-white">Kiosk Manager</h1>
    <p class="text-indigo-200 mt-1">Retail Management System</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-2xl px-8 py-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Sign In</h2>

    {{if .error}}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-5 flex items-center gap-2">
      <i class="fas fa-exclamation-circle"></i>
      <span>{{.error}}</span>
    </div>
    {{end}}

    {{if .registered}}
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-5 flex items-center gap-2">
      <i class="fas fa-check-circle"></i>
      <span>Registration successful. Please sign in.</span>
    </div>
    {{end}}

    <form method="POST" action="/login" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
            <i class="fas fa-envelope text-gray-400"></i>
          </div>
          <input type="email" name="email" value="{{.email}}" required autofocus
            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-sm"
            placeholder="admin@example.com">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
            <i class="fas fa-lock text-gray-400"></i>
          </div>
          <input type="password" name="password" required id="password-input"
            class="w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-sm"
            placeholder="••••••••">
          <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-3 flex items-center">
            <i class="fas fa-eye text-gray-400 text-sm" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2">
        <i class="fas fa-sign-in-alt"></i>
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Default: <code class="bg-gray-100 px-1 rounded">admin@kiosk.local</code> / <code class="bg-gray-100 px-1 rounded">Admin@1234</code>
    </p>
  </div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password-input');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }
</script>
</body>
</html>
{{end}}
