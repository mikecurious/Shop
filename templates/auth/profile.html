{{define "auth/profile.html"}}
{{template "nav" .}}

<div class="max-w-lg">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Profile</h1>

  {{if .error}}
  <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 flex items-center gap-2">
    <i class="fas fa-exclamation-circle"></i> {{.error}}
  </div>
  {{end}}
  {{if .success}}
  <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 flex items-center gap-2">
    <i class="fas fa-check-circle"></i> {{.success}}
  </div>
  {{end}}

  {{if .claims}}
  <!-- User Info -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-5">
    <div class="flex items-center gap-4 mb-5">
      <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center">
        <i class="fas fa-user text-indigo-600 text-2xl"></i>
      </div>
      <div>
        <p class="text-xl font-bold text-gray-900">{{.claims.Name}}</p>
        <p class="text-gray-500">{{.claims.Email}}</p>
        <span class="bg-indigo-100 text-indigo-700 text-xs font-semibold px-2 py-0.5 rounded-full capitalize mt-1 inline-block">
          {{.claims.Role}}
        </span>
      </div>
    </div>
  </div>

  <!-- Change Password -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h2 class="font-semibold text-gray-800 mb-4">Change Password</h2>
    <form method="POST" action="/profile/password" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
        <input type="password" name="old_password" required
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input type="password" name="new_password" required minlength="8"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
        <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
      </div>
      <button type="submit" class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm hover:bg-indigo-700 font-medium">
        Update Password
      </button>
    </form>
  </div>
  {{end}}
</div>

{{template "nav-end" .}}
{{end}}
