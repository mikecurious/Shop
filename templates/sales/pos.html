{{define "sales/pos.html"}}
{{template "nav" .}}

<div class="h-full">
  <h1 class="text-2xl font-bold text-gray-900 mb-5">Point of Sale</h1>

  <div class="grid grid-cols-1 lg:grid-cols-5 gap-5 h-full">
    <!-- Product Search (left) -->
    <div class="lg:col-span-3 space-y-4">
      <!-- Search -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" id="product-search" placeholder="Search products or scan barcode..."
            class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
            hx-get="/partials/products/search"
            hx-target="#search-results"
            hx-trigger="keyup changed delay:300ms"
            name="q"
            autofocus>
        </div>
      </div>

      <!-- Search Results -->
      <div id="search-results" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden min-h-[200px]">
        <div class="p-4 text-center text-gray-400 text-sm">
          <i class="fas fa-search text-2xl mb-2 block"></i>
          Search for products above
        </div>
      </div>
    </div>

    <!-- Cart (right) -->
    <div class="lg:col-span-2">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sticky top-4">
        <h2 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
          <i class="fas fa-shopping-cart text-indigo-500"></i>
          Cart <span id="cart-count" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded-full ml-auto">0</span>
        </h2>

        <!-- Cart Items -->
        <div id="cart-items" class="space-y-2 min-h-[120px] max-h-60 overflow-y-auto">
          <p class="text-center text-gray-400 text-sm py-8">Cart is empty</p>
        </div>

        <div class="border-t border-gray-100 mt-4 pt-4 space-y-3">
          <!-- Discount -->
          <div class="flex gap-2">
            <select id="discount-type" class="border border-gray-200 rounded-lg px-2 py-1.5 text-sm flex-1 focus:ring-2 focus:ring-indigo-500 outline-none">
              <option value="">No Discount</option>
              <option value="percentage">% Off</option>
              <option value="fixed">Fixed KES</option>
            </select>
            <input type="number" id="discount-value" placeholder="0" min="0"
              class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-24 focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>

          <!-- Totals -->
          <div class="space-y-1 text-sm">
            <div class="flex justify-between text-gray-600">
              <span>Subtotal</span>
              <span id="subtotal">KES 0.00</span>
            </div>
            <div class="flex justify-between text-gray-600" id="discount-row" style="display:none">
              <span>Discount</span>
              <span id="discount-display" class="text-red-600">-KES 0.00</span>
            </div>
            <div class="flex justify-between font-bold text-gray-900 text-base border-t border-gray-100 pt-2">
              <span>TOTAL</span>
              <span id="total">KES 0.00</span>
            </div>
          </div>

          <!-- Customer -->
          <div class="space-y-2">
            <input type="text" id="customer-name" placeholder="Customer name (optional)"
              class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            <input type="tel" id="customer-phone" placeholder="Customer phone (optional)"
              class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>

          <!-- Payment Method -->
          <div>
            <p class="text-xs font-semibold text-gray-500 mb-2">Payment Method</p>
            <div class="grid grid-cols-2 gap-2">
              <label class="flex items-center gap-2 border border-gray-200 rounded-lg px-3 py-2 cursor-pointer hover:border-indigo-400 text-sm">
                <input type="radio" name="payment_method" value="cash" checked class="text-indigo-600"> Cash
              </label>
              <label class="flex items-center gap-2 border border-gray-200 rounded-lg px-3 py-2 cursor-pointer hover:border-indigo-400 text-sm">
                <input type="radio" name="payment_method" value="mpesa" class="text-indigo-600">
                <i class="fas fa-mobile-alt text-green-500"></i> M-Pesa
              </label>
              <label class="flex items-center gap-2 border border-gray-200 rounded-lg px-3 py-2 cursor-pointer hover:border-indigo-400 text-sm">
                <input type="radio" name="payment_method" value="card" class="text-indigo-600"> Card
              </label>
              <label class="flex items-center gap-2 border border-gray-200 rounded-lg px-3 py-2 cursor-pointer hover:border-indigo-400 text-sm">
                <input type="radio" name="payment_method" value="credit" class="text-indigo-600"> Credit
              </label>
            </div>
          </div>

          <!-- M-Pesa STK Push -->
          <div id="mpesa-section" class="hidden bg-green-50 rounded-lg p-3 space-y-2">
            <p class="text-xs font-semibold text-green-700">STK Push to customer</p>
            <div class="flex gap-2">
              <input type="tel" id="mpesa-phone" placeholder="07XXXXXXXX"
                class="flex-1 border border-green-200 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-green-400 outline-none">
              <button onclick="sendSTKPush()" id="stk-btn"
                class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-green-700">
                Send
              </button>
            </div>
            <div id="stk-status" class="text-xs text-green-600 hidden"></div>
          </div>

          <button onclick="completeSale()" id="checkout-btn"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-bold text-base transition disabled:opacity-50 disabled:cursor-not-allowed">
            <i class="fas fa-check mr-2"></i> Complete Sale
          </button>

          <button onclick="clearCart()"
            class="w-full border border-gray-200 text-gray-500 hover:bg-gray-50 py-2 rounded-lg text-sm">
            Clear Cart
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Sale Complete Modal -->
<div id="sale-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center">
    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-check text-green-600 text-2xl"></i>
    </div>
    <h3 class="text-xl font-bold text-gray-800 mb-2">Sale Complete!</h3>
    <p id="sale-amount" class="text-3xl font-bold text-indigo-600 mb-6"></p>
    <div class="flex gap-3">
      <button onclick="closeSaleModal()" class="flex-1 border border-gray-200 text-gray-700 py-2 rounded-lg text-sm hover:bg-gray-50">
        New Sale
      </button>
      <a id="receipt-link" href="#" target="_blank"
         class="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm hover:bg-indigo-700 flex items-center justify-center gap-2">
        <i class="fas fa-receipt"></i> Receipt
      </a>
    </div>
  </div>
</div>

<script>
let cart = [];

function addToCart(id, name, sku, price, stock) {
  const existing = cart.find(i => i.product_id === id);
  if (existing) {
    if (existing.quantity >= stock) {
      showToast('Insufficient stock', 'error');
      return;
    }
    existing.quantity++;
    existing.subtotal = existing.quantity * existing.unit_price;
  } else {
    cart.push({ product_id: id, name, sku, unit_price: price, quantity: 1, subtotal: price, stock });
  }
  renderCart();
}

function removeFromCart(id) {
  cart = cart.filter(i => i.product_id !== id);
  renderCart();
}

function updateQty(id, qty) {
  const item = cart.find(i => i.product_id === id);
  if (!item) return;
  if (qty <= 0) { removeFromCart(id); return; }
  if (qty > item.stock) { showToast('Insufficient stock', 'warning'); return; }
  item.quantity = qty;
  item.subtotal = item.quantity * item.unit_price;
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cart-items');
  document.getElementById('cart-count').textContent = cart.length;

  if (cart.length === 0) {
    container.innerHTML = '<p class="text-center text-gray-400 text-sm py-8">Cart is empty</p>';
    updateTotals();
    return;
  }

  container.innerHTML = cart.map(item => `
    <div class="flex items-center gap-2 py-2 border-b border-gray-50 last:border-0">
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-800 truncate">${item.name}</p>
        <p class="text-xs text-gray-400">KES ${item.unit_price.toFixed(2)}</p>
      </div>
      <div class="flex items-center gap-1">
        <button onclick="updateQty('${item.product_id}', ${item.quantity - 1})"
          class="w-6 h-6 rounded-full border border-gray-200 text-gray-500 hover:bg-gray-100 text-xs flex items-center justify-center">−</button>
        <span class="w-8 text-center text-sm font-semibold">${item.quantity}</span>
        <button onclick="updateQty('${item.product_id}', ${item.quantity + 1})"
          class="w-6 h-6 rounded-full border border-gray-200 text-gray-500 hover:bg-gray-100 text-xs flex items-center justify-center">+</button>
      </div>
      <span class="text-sm font-semibold text-gray-800 w-20 text-right">KES ${item.subtotal.toFixed(2)}</span>
      <button onclick="removeFromCart('${item.product_id}')" class="text-gray-300 hover:text-red-500 ml-1">
        <i class="fas fa-times text-xs"></i>
      </button>
    </div>
  `).join('');

  updateTotals();
}

function updateTotals() {
  const subtotal = cart.reduce((sum, i) => sum + i.subtotal, 0);
  const discType = document.getElementById('discount-type').value;
  const discVal = parseFloat(document.getElementById('discount-value').value) || 0;

  let discountAmount = 0;
  if (discType === 'percentage') discountAmount = subtotal * (discVal / 100);
  else if (discType === 'fixed') discountAmount = Math.min(discVal, subtotal);

  const total = subtotal - discountAmount;

  document.getElementById('subtotal').textContent = 'KES ' + subtotal.toFixed(2);
  document.getElementById('total').textContent = 'KES ' + total.toFixed(2);

  const discRow = document.getElementById('discount-row');
  if (discountAmount > 0) {
    discRow.style.display = 'flex';
    document.getElementById('discount-display').textContent = '-KES ' + discountAmount.toFixed(2);
  } else {
    discRow.style.display = 'none';
  }
}

function clearCart() {
  cart = [];
  renderCart();
}

document.getElementById('discount-type').addEventListener('change', updateTotals);
document.getElementById('discount-value').addEventListener('input', updateTotals);

document.querySelectorAll('input[name="payment_method"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('mpesa-section').classList.toggle('hidden', r.value !== 'mpesa');
  });
});

async function completeSale() {
  if (cart.length === 0) { showToast('Cart is empty', 'error'); return; }

  const btn = document.getElementById('checkout-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processing...';

  const discType = document.getElementById('discount-type').value;
  const discVal = parseFloat(document.getElementById('discount-value').value) || 0;
  const payMethod = document.querySelector('input[name="payment_method"]:checked').value;

  const payload = {
    items: cart.map(i => ({ product_id: i.product_id, quantity: i.quantity })),
    discount_type: discType,
    discount_value: discVal,
    payment_method: payMethod,
    customer_name: document.getElementById('customer-name').value,
    customer_phone: document.getElementById('customer-phone').value,
  };

  try {
    const res = await fetch('/api/v1/sales', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (!res.ok) {
      showToast(data.error || 'Sale failed', 'error');
      return;
    }

    // Show success modal
    document.getElementById('sale-amount').textContent = 'KES ' + data.net_amount.toFixed(2);
    document.getElementById('receipt-link').href = data.receipt_url;
    document.getElementById('sale-modal').classList.remove('hidden');
    clearCart();
  } catch(e) {
    showToast('Network error', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-check mr-2"></i> Complete Sale';
  }
}

async function sendSTKPush() {
  const phone = document.getElementById('mpesa-phone').value;
  const totalText = document.getElementById('total').textContent;
  const amount = parseFloat(totalText.replace('KES ', ''));

  if (!phone || amount <= 0) { showToast('Enter phone and ensure cart has items', 'error'); return; }

  const btn = document.getElementById('stk-btn');
  btn.disabled = true; btn.textContent = '...';

  try {
    const res = await fetch('/api/v1/mpesa/stk-push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ phone_number: phone, amount, account_ref: 'KioskSale', description: 'Kiosk Purchase' })
    });
    const data = await res.json();
    const status = document.getElementById('stk-status');
    if (res.ok) {
      status.textContent = '✓ STK Push sent. Waiting for customer confirmation...';
      status.classList.remove('hidden');
      showToast('STK Push sent!', 'success');
    } else {
      showToast(data.error, 'error');
    }
  } finally {
    btn.disabled = false; btn.textContent = 'Send';
  }
}

function closeSaleModal() {
  document.getElementById('sale-modal').classList.add('hidden');
}
</script>

{{template "nav-end" .}}
{{end}}
