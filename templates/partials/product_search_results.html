{{define "partials/product_search_results.html"}}
{{if .products}}
<div class="divide-y divide-gray-50">
  {{range .products}}
  <div class="flex items-center justify-between px-4 py-3 hover:bg-indigo-50 cursor-pointer transition"
       onclick="addToCart('{{.ID}}', '{{.Name}}', '{{.SKU}}', {{.SellingPrice}}, {{.Quantity}})">
    <div>
      <p class="text-sm font-medium text-gray-800">{{.Name}}</p>
      <p class="text-xs text-gray-400">{{.SKU}} · KES {{printf "%.2f" .SellingPrice}}</p>
    </div>
    <div class="text-right">
      <span class="{{if le .Quantity .ReorderLevel}}text-red-600{{else}}text-gray-600{{end}} text-xs font-medium">
        {{.Quantity}} in stock
      </span>
      <button class="ml-2 bg-indigo-100 text-indigo-700 w-7 h-7 rounded-full text-sm hover:bg-indigo-200">
        +
      </button>
    </div>
  </div>
  {{end}}
</div>
{{else}}
<div class="p-8 text-center text-gray-400">
  <i class="fas fa-search text-2xl mb-2 block"></i>
  <p class="text-sm">No products found</p>
</div>
{{end}}
{{end}}
