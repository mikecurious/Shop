{{define "error.html"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <title>Error — Kiosk Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
<div class="text-center max-w-md mx-auto px-4">
  <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
    <svg class="w-10 h-10 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.07 16.5C2.3 17.333 3.262 19 4.802 19z"/>
    </svg>
  </div>
  <h1 class="text-2xl font-bold text-gray-800 mb-2">Something went wrong</h1>
  <p class="text-gray-500 mb-6">{{.message}}</p>
  <a href="/dashboard" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 inline-block font-medium">
    Back to Dashboard
  </a>
</div>
</body>
</html>
{{end}}
